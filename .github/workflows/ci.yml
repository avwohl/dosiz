name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build meson pkg-config ccache \
            libsdl2-dev libsdl2-net-dev libpng-dev libopusfile-dev \
            libspeexdsp-dev libfluidsynth-dev libslirp-dev libasound2-dev \
            libxi-dev libglib2.0-dev

      - name: Cache dosbox-staging build
        uses: actions/cache@v4
        with:
          path: dosbox-staging/build
          key: dosbox-staging-${{ hashFiles('dosbox-staging/meson.build', 'dosbox-staging/meson_options.txt', 'patches/*.patch') }}

      - name: Build (applies submodule patch, meson+ninja, then dosemu)
        run: make -j$(nproc)

      - name: Smoke (--version)
        run: build/dosemu --version

      - name: Smoke (run HELLO.COM)
        run: |
          output=$(build/dosemu tests/HELLO.COM 2>/dev/null)
          echo "dosemu output: $output"
          echo "$output" | grep -q 'dosemu-hello-ok'

      - name: Smoke (run HELLO.EXE, verify MZ loader)
        run: |
          output=$(build/dosemu tests/HELLO.EXE 2>/dev/null)
          echo "dosemu output: $output"
          echo "$output" | grep -q 'dosemu-hello-exe-ok'

      - name: Smoke (run SYSCALLS.COM, verify AH=30/48/25/35)
        run: |
          output=$(build/dosemu tests/SYSCALLS.COM 2>/dev/null)
          echo "dosemu output: $output"
          echo "$output" | grep -q 'dosver=6.22'
          # MCB allocator places the first MCB at 0x2000, so data lands
          # at 0x2001.  The old bump allocator returned 0x2000.
          echo "$output" | grep -q 'alloc=0x2001'
          echo "$output" | grep -q 'int21-set-ok'

      - name: Smoke (MCB chain reuses memory after free)
        run: |
          out=$(build/dosemu tests/MCB_TEST.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'alloc-free-alloc-same'

      - name: DPMI stage 2: detection reports present
        run: |
          out=$(build/dosemu tests/DPMI_PROBE.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi=present'

      - name: DPMI stage 5: INT 21h from protected mode reflected to host
        run: |
          # PM client does INT 21h AH=09 (print) then AH=4Ch (exit).  Both
          # go through our IDT gate -> dosbox's CB_INT21 callback path ->
          # our host C++ handler (SegPhys() makes the memory accesses work
          # transparently in PM).  Exit code 0 = fully end-to-end PM I/O.
          out=$(build/dosemu tests/DPMI_STAGE5.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-stage5=hello-from-pm'

      - name: DPMI stage 5 (32-bit PM): INT 21h from 32-bit client reflects
        run: |
          # Same flow as the 16-bit fixture, but the client entered PM with
          # AX=1 so CS has D=1 and the IDT gate is a 32-bit interrupt gate.
          # Requires the IRETD callback stub (`66 CF`) to unwind the 12-byte
          # frame the 32-bit gate pushes -- a 16-bit IRET pops CS from the
          # high half of EIP (=0 = null descriptor) and the emulator aborts.
          out=$(build/dosemu tests/DPMI_STAGE5_32.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-stage5-32=hello-from-pm32'

      - name: Baseline (INT 31h denial stub returns CF=1 / AX=8001h)
        run: |
          # DPMI_INT31.COM calls an unhandled sub-function (AX=FF00h) so
          # the default-deny path is exercised even after stage 4 landed
          # real handlers for AX=0400/0006/0007.
          out=$(build/dosemu tests/DPMI_INT31.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'int31=denied'

      - name: DPMI stage 4: INT 31h version + seg base get/set from PM
        run: |
          # Enters 16-bit PM, then exercises INT 31h via the PM IDT gate:
          #   AX=0400 Get DPMI version
          #   AX=0007 Set segment base    -> writes GDT descriptor bytes 2-4,7
          #   AX=0006 Get segment base    -> reads same bytes back
          #   AX=0006 with an out-of-range selector returns CF=1/AX=8022h
          # A regression in any sub-function prints a distinct fail tag.
          out=$(build/dosemu tests/DPMI_STAGE4.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-stage4=ok'

      - name: DPMI stage 4b: LDT descriptor alloc/free/convert
        run: |
          # Exercises INT 31h AX=0000 (alloc N LDT descriptors),
          # AX=0001 (free), AX=0002 (segment-to-descriptor, repeat-call
          # caching), AX=0003 (selector increment = 8), plus AX=0007
          # extended to accept LDT selectors.  The alias for the PSP
          # segment is validated by reading the INT 20h marker word
          # through the newly-allocated LDT-selector-loaded ES.
          out=$(build/dosemu tests/DPMI_STAGE4B.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-stage4b=ok'

      - name: DPMI stage 4c: IVT read/write + free memory info
        run: |
          # AX=0204/0205 read/write the real-mode IVT through the DPMI
          # host; AX=0500 fills a 0x30-byte buffer with memory info
          # (largest-free-block derived from the MCB chain, most other
          # fields 0xFFFFFFFF "not supported").  Real clients call these
          # during init before doing anything interesting.
          out=$(build/dosemu tests/DPMI_STAGE4C.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-stage4c=ok'

      - name: DPMI reflection: INT 10h AH=0F from 16-bit PM reaches BIOS
        run: |
          # Un-installed PM IDT vectors used to fault with "INT:Gate
          # Selector points to illegal descriptor with type 0x0".  Our
          # DPMI entry now walks the real-mode IVT and installs 16-bit
          # PM IDT gates for every vector whose seg == CB_SEG (0xF000),
          # routing the PM INT to the same native callback the real-mode
          # vector points at.  This fixture asks video mode (INT 10h
          # AH=0F) from both RM and PM and verifies the results match.
          out=$(build/dosemu tests/DPMI_REFLECT.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-reflect=ok'

      - name: DPMI integration: chain stages 2-6 + reflection in 32-bit PM
        run: |
          # Hand-assembled "realistic client" in 32-bit PM: detect DPMI,
          # switch, AX=0400/0003/0000/0501/0007 (version/incr/LDT-alloc/
          # mem-alloc/set-base), load LDT selector into FS, round-trip
          # a 32-bit pattern at offset 0 and 1020, INT 10h reflection
          # (32-bit shim path), AX=0503 grow, INT 21h AH=09 print,
          # AX=0502 free, AX=0001 free LDT, exit 0.  A single pass
          # validates that every DPMI service integrates cleanly with
          # every other one from a 32-bit client's perspective.
          out=$(build/dosemu tests/DPMI_INTEGRATION.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-integration=ok'

      - name: AH=4Bh + AH=4Dh: 3-level nesting (grand -> middle -> child)
        run: |
          # GRAND spawns MIDDLE (which spawns CHILD).  Each parent
          # verifies the child's exit code via AH=4Dh before exiting
          # with its own distinctive code for its parent to check.
          # Exercises s_process_stack beyond one frame.
          workdir=$(mktemp -d)
          cp tests/CHILD.COM tests/MIDDLE.COM tests/GRAND.COM "$workdir/"
          cat > "$workdir/run.cfg" <<EOF
          program = $workdir/GRAND.COM
          drive_C = $workdir
          EOF
          out=$(build/dosemu "$workdir/run.cfg" 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'child=ran'
          echo "$out" | grep -q 'middle=ok'
          echo "$out" | grep -q 'grand=ok'

      - name: AH=4Bh Load and Execute Program (spawn child, resume parent)
        run: |
          # Parent (SPAWN.COM) calls AH=4Bh AL=0 with DS:DX = "CHILD.COM"
          # + a minimal parameter block.  Our handler allocates 64KB
          # from the MCB chain, loads CHILD.COM at that PSP seg, saves
          # parent state on a process_stack, recursively enters
          # DOSBOX_RunMachine.  Child's AH=4Ch is nested-aware: sets
          # the child's exit code in the top process-stack frame and
          # returns CBRET_STOP (not shutdown_requested) so only the
          # nested RunMachine unwinds.  Parent AH=4Bh resumes, restores
          # state, frees child memory, returns the child's exit code
          # in AL.  CI combines parent+child output in one stream.
          workdir=$(mktemp -d)
          cp tests/CHILD.COM "$workdir/"
          cp tests/SPAWN.COM "$workdir/"
          cat > "$workdir/run.cfg" <<EOF
          program = $workdir/SPAWN.COM
          drive_C = $workdir
          EOF
          out=$(build/dosemu "$workdir/run.cfg" 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'child=ran'
          echo "$out" | grep -q 'spawn=ok'

      - name: DPMI AX=0303/0304 real-mode callback addresses
        run: |
          # PM client registers a callback via 0303, calls a RM
          # trampoline (via 0301) that FAR-CALLs the returned RM
          # address.  The 0303 handler enters PM, invokes the callback,
          # returns.  Callback mutates struct.EAX to 0xABCD; fixture
          # verifies after 0301 completes.  Tests nested RM->PM->RM
          # mode switching.
          out=$(build/dosemu tests/DPMI_RMCB.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-rmcb=ok'

      - name: DPMI descriptor mgmt AX=0008/0009/000A/000B/000C
        run: |
          out=$(build/dosemu tests/DPMI_DESCMGMT.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-descmgmt=ok'

      - name: DPMI extra AX=0102/0305/0306/0801/0B00
        run: |
          out=$(build/dosemu tests/DPMI_EXTRA.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-extra=ok'

      - name: DPMI stubs AX=0202/0203/0600/0601/0604/0800
        run: |
          # PM exception handler get/set (0202/0203, 32-entry table),
          # lock/unlock linear region (0600/0601 -- no-op since no
          # paging), get page size (0604 = 4096), physical address
          # mapping (0800 -- linear=physical pass-through).  All
          # probed by real clients during init.
          out=$(build/dosemu tests/DPMI_STUBS.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-stubs=ok'

      - name: DPMI AX=0210/0212 + 0900/0901/0902 PM IDT + virtual IF
        run: |
          # AX=0210 reads / AX=0212 writes a PM IDT gate.  Client
          # installs its own PM INT handlers via 0212.  Virtual IF
          # state is tracked as a shadow boolean: 0900 get+disable,
          # 0901 get+enable, 0902 read.
          out=$(build/dosemu tests/DPMI_PMIDT.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-pmidt=ok'

      - name: DPMI AX=0100/0101: DOS memory alloc/free (hybrid RM+PM)
        run: |
          # AX=0100 allocates via the MCB chain and pairs the result
          # with a fresh LDT selector whose descriptor aliases the MCB
          # region.  Client can use the returned RM seg in real-mode
          # DOS calls OR the PM selector in-mode; both point at the
          # same bytes.  AX=0002 (segment-to-descriptor) must return
          # the cached selector for identity semantics.
          out=$(build/dosemu tests/DPMI_DOSMEM.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-dosmem=ok'

      - name: DPMI AX=0302: Call Real Mode Procedure With IRET Frame
        run: |
          # Same mode-switch as 0300/0301 but pushes an IRET frame
          # (IP, CS, FLAGS) pointing at a host "stop" callback before
          # jumping to the client's procedure.  The procedure's IRET
          # lands on the stop callback's FE 38 stub which returns
          # CBRET_STOP, unwinding the nested DOSBOX_RunMachine.
          out=$(build/dosemu tests/DPMI_CALLRMI.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-callrmi=ok'

      - name: DPMI AX=0301: Call Real Mode Procedure With Far Return
        run: |
          # Same mode-switch machinery as AX=0300, but the RM dispatcher
          # is CALLBACK_RunRealFar(cs, ip) instead of
          # CALLBACK_RunRealInt.  Fixture bundles its own RM routine
          # (`mov ax, 0x1234; retf`) inside the .COM, passes CS:IP to
          # AX=0301, and verifies struct.EAX came back as 0x1234.
          out=$(build/dosemu tests/DPMI_CALLRM.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-callrm=ok'

      - name: DPMI AX=0300: Simulate Real Mode Interrupt
        run: |
          # Full mode-switch round-trip: save PM state, swap IDTR to
          # the RM IVT (ours points at the PM IDT -- left loaded, the
          # RM INT reads 8-byte PM gate descriptors as 4-byte seg:off
          # pairs and jumps to garbage), clear CR0.PE, load RM regs
          # from client struct, CALLBACK_RunRealInt, restore CR0.PE +
          # PM IDTR, reload PM segments (including a manual CS cache
          # refresh), write RM results back to the struct.
          # Fixture invokes INT 1Ah AH=00 (BIOS tick count) and
          # verifies the struct's ECX/EDX came back non-zero.
          out=$(build/dosemu tests/DPMI_SIMRM.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-simrm=ok'

      - name: DPMI stage 6b: AX=0503 resize memory block (shrink + grow)
        run: |
          # Alloc 256 bytes, shrink to 64 (in-place split), grow back to
          # 128 (reclaims the freshly-split free tail).  AX=0503 returns
          # the same handle + base on in-place ops; a real DPMI spec
          # host may relocate on grow but we explicitly don't.
          out=$(build/dosemu tests/DPMI_STAGE6B.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-stage6b=ok'

      - name: DPMI reflection (32-bit): INT 10h AH=0F from 32-bit PM
        run: |
          # Same as DPMI_REFLECT.COM but enters PM with AX=1 (32-bit).
          # The 32-bit gate pushes a 12-byte frame that plain `CF` (16-bit
          # IRET) can't unwind, so dosemu now builds per-vector shims
          # ending in `66 CF` (IRETD) at PM_SHIM_SEG and points 32-bit
          # IDT gates at them.  Mines the existing RM stub for each
          # vector's `FE 38 LL HH` native-call number.
          out=$(build/dosemu tests/DPMI_REFLECT32.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-reflect32=ok'

      - name: DPMI stage 6: alloc, write/read round-trip, free
        run: |
          # INT 31h AX=0501 allocates 256 bytes from the MCB arena and
          # returns BX:CX = linear address + SI:DI = handle.  The fixture
          # repoints the PM ES selector at the block (AX=0007), writes
          # and reads back a pattern at offset 0 and 254 to verify the
          # full 256-byte span is mapped, then frees via AX=0502.
          out=$(build/dosemu tests/DPMI_STAGE6.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'dpmi-stage6=ok'

      - name: Real compiler output (Open Watcom 16-bit hello)
        run: |
          out=$(build/dosemu tests/HELLO_W.EXE 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'hello from watcom'

      - name: Real compiler output (bcc hello)
        run: |
          out=$(build/dosemu tests/HELLO_B.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'hello from bcc'

      - name: Real DOS-hosted Watcom tool (exe2bin.exe prints banner)
        run: |
          out=$(build/dosemu tests/EXE2BIN.EXE 2>/dev/null)
          echo "dosemu output: $out"
          # Real Open Watcom DOS-hosted binary from the official distribution.
          echo "$out" | grep -q 'Open Watcom EXE to Binary Converter'

      - name: Real tool (FreeDOS xcopy.exe copies a file)
        run: |
          xcopy=dosbox-staging/build/resources/drives/y/dos/xcopy.exe
          if [ ! -f "$xcopy" ]; then
            echo "SKIP: xcopy.exe missing from dosbox-staging build tree"
            exit 0
          fi
          workdir=$(mktemp -d)
          cp "$xcopy" "$workdir/"
          printf 'hello from xcopy test\n' > "$workdir/src.txt"
          cat > "$workdir/r.cfg" <<EOF
          program = $workdir/xcopy.exe
          args = src.txt dst.txt
          drive_C = $workdir
          EOF
          # xcopy prompts when the dest doesn't exist; 'F' = "it's a file".
          echo 'F' | build/dosemu "$workdir/r.cfg" 2>/dev/null
          diff "$workdir/src.txt" "$workdir/dst.txt"

      - name: Smoke (.cfg drives + default_mode=text)
        run: |
          workdir=$(mktemp -d)
          cat > "$workdir/write.cfg" <<EOF
          program = $GITHUB_WORKSPACE/tests/WRITE.COM
          args = from-cfg
          drive_C = $workdir
          default_mode = text
          EOF
          build/dosemu "$workdir/write.cfg" 2>/dev/null
          if grep -qU $'\r' "$workdir/WROTE.TXT"; then
            echo "FAIL: WROTE.TXT still contains CR in text mode"
            xxd "$workdir/WROTE.TXT"
            exit 1
          fi
          grep -q 'dosemu-wrote-ok' "$workdir/WROTE.TXT"
          grep -q 'from-cfg'        "$workdir/WROTE.TXT"

      - name: Smoke (.cfg exact file mapping redirects host path)
        run: |
          workdir=$(mktemp -d)
          cat > "$workdir/exact.cfg" <<EOF
          program = $GITHUB_WORKSPACE/tests/WRITE.COM
          args = exact-map
          drive_C = $workdir
          WROTE.TXT = $workdir/renamed.out text
          EOF
          build/dosemu "$workdir/exact.cfg" 2>/dev/null
          # Must land in renamed.out, not WROTE.TXT.
          test -f "$workdir/renamed.out"
          test ! -f "$workdir/WROTE.TXT"
          grep -q 'exact-map' "$workdir/renamed.out"

      - name: Smoke (.cfg wildcard mapping toggles text mode)
        run: |
          workdir=$(mktemp -d)
          cat > "$workdir/wild.cfg" <<EOF
          program = $GITHUB_WORKSPACE/tests/WRITE.COM
          args = wild-map
          drive_C = $workdir
          *.TXT = text
          EOF
          build/dosemu "$workdir/wild.cfg" 2>/dev/null
          if grep -qU $'\r' "$workdir/WROTE.TXT"; then
            echo "FAIL: wildcard *.TXT=text did not strip CR"
            xxd "$workdir/WROTE.TXT"
            exit 1
          fi

      - name: Smoke (findfirst/findnext + 8.3 mangling)
        run: |
          workdir=$(mktemp -d)
          touch "$workdir/hello.tst" "$workdir/world.tst" \
                "$workdir/thirdfile.tst" "$workdir/ignored.bin"
          cat > "$workdir/run.cfg" <<EOF
          program = $GITHUB_WORKSPACE/tests/LISTDIR.COM
          drive_C = $workdir
          EOF
          out=$(build/dosemu "$workdir/run.cfg" 2>/dev/null)
          echo "$out"
          echo "$out" | grep -q '^HELLO\.TST$'
          echo "$out" | grep -q '^WORLD\.TST$'
          echo "$out" | grep -q '^THIRDF~1\.TST$'
          echo "$out" | grep -vq '^IGNORED'

      - name: Smoke (collision-aware 8.3 numbering)
        run: |
          workdir=$(mktemp -d)
          touch "$workdir/longfilename1.tst" \
                "$workdir/longfilename2.tst" \
                "$workdir/longfilename3.tst"
          cat > "$workdir/run.cfg" <<EOF
          program = $GITHUB_WORKSPACE/tests/LISTDIR.COM
          drive_C = $workdir
          EOF
          out=$(build/dosemu "$workdir/run.cfg" 2>/dev/null)
          echo "$out"
          echo "$out" | grep -q '^LONGFI~1\.TST$'
          echo "$out" | grep -q '^LONGFI~2\.TST$'
          echo "$out" | grep -q '^LONGFI~3\.TST$'

      - name: Smoke (auto mode picks text by extension)
        run: |
          workdir=$(mktemp -d)
          cat > "$workdir/run.cfg" <<EOF
          program = $GITHUB_WORKSPACE/tests/WRITE.COM
          args = auto-ext
          drive_C = $workdir
          default_mode = auto
          EOF
          build/dosemu "$workdir/run.cfg" 2>/dev/null
          if grep -qU $'\r' "$workdir/WROTE.TXT"; then
            echo "FAIL: auto mode did not apply text translation to .TXT"
            xxd "$workdir/WROTE.TXT"
            exit 1
          fi

      - name: Smoke (stdin input via AH=01h)
        run: |
          out=$(echo 'hi-stdin' | build/dosemu tests/ECHOIN.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'hi-stdin'

      - name: Smoke (CAT.COM read path, binary mode is passthrough)
        run: |
          workdir=$(mktemp -d)
          printf 'line1\nline2\n' > "$workdir/input.txt"
          cat > "$workdir/bin.cfg" <<EOF
          program = $GITHUB_WORKSPACE/tests/CAT.COM
          args = input.txt
          drive_C = $workdir
          default_mode = binary
          EOF
          out=$(build/dosemu "$workdir/bin.cfg" 2>/dev/null)
          echo "out: $(printf '%q' "$out")"
          # Output should match input exactly (\n preserved, no \r).
          if printf '%s' "$out" | grep -qU $'\r'; then
            echo "FAIL: binary mode inserted CR"; exit 1
          fi
          printf '%s' "$out" | grep -q 'line1'
          printf '%s' "$out" | grep -q 'line2'

      - name: Smoke (CAT.COM read path, auto mode expands LF to CRLF)
        run: |
          workdir=$(mktemp -d)
          printf 'line1\nline2\n' > "$workdir/input.txt"
          cat > "$workdir/txt.cfg" <<EOF
          program = $GITHUB_WORKSPACE/tests/CAT.COM
          args = input.txt
          drive_C = $workdir
          default_mode = auto
          EOF
          out=$(build/dosemu "$workdir/txt.cfg" 2>/dev/null)
          echo "out: $(printf '%q' "$out")"
          printf '%s' "$out" | grep -qU $'line1\r' || { echo "FAIL"; exit 1; }

      - name: Smoke (env block at PSP:2Ch)
        run: |
          out=$(build/dosemu tests/ENVDUMP.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'COMSPEC='

      - name: Smoke (unknown INT 21h AH soft-fails, program continues)
        run: |
          out=$(build/dosemu tests/SURVIVE.COM 2>/dev/null)
          echo "dosemu output: $out"
          echo "$out" | grep -q 'survived-unimpl'

      - name: Smoke (DOSEMU_PATH search, bare name + case-insensitive)
        run: |
          out=$(DOSEMU_PATH=tests build/dosemu HELLO 2>/dev/null)
          echo "bare HELLO: $out"
          echo "$out" | grep -q 'dosemu-hello-ok'
          out=$(DOSEMU_PATH=tests build/dosemu hello 2>/dev/null)
          echo "lowercase hello: $out"
          echo "$out" | grep -q 'dosemu-hello-ok'
          # Failure case: name not on path, dosemu exits non-zero.
          if build/dosemu DOES_NOT_EXIST 2>/dev/null; then
            echo "FAIL: missing program should exit non-zero"; exit 1
          fi

      - name: Smoke (AH=42h seek -> size reporting via SIZE.COM)
        run: |
          workdir=$(mktemp -d)
          printf 'hello, world!' > "$workdir/small.bin"   # 13 bytes
          cat > "$workdir/r.cfg" <<EOF
          program = $GITHUB_WORKSPACE/tests/SIZE.COM
          args = small.bin
          drive_C = $workdir
          EOF
          out=$(build/dosemu "$workdir/r.cfg" 2>/dev/null)
          echo "$out"
          echo "$out" | grep -qx 'size=13'

      - name: Smoke (sidecar .cfg auto-loads next to executable)
        run: |
          workdir=$(mktemp -d)
          cp tests/WRITE.COM "$workdir/"
          cat > "$workdir/WRITE.cfg" <<EOF
          args = from-sidecar
          drive_C = $workdir
          default_mode = text
          EOF
          DOSEMU_PATH=$workdir build/dosemu WRITE 2>/dev/null
          # Sidecar args=... must reach the program.
          grep -q 'from-sidecar' "$workdir/WROTE.TXT"
          # Sidecar default_mode=text must strip CR.
          if grep -qU $'\r' "$workdir/WROTE.TXT"; then
            echo "FAIL: sidecar default_mode=text did not apply"; exit 1
          fi

      - name: Smoke (run WRITE.COM, verify file I/O + command tail)
        run: |
          workdir=$(mktemp -d)
          cd "$workdir"
          "$GITHUB_WORKSPACE/build/dosemu" "$GITHUB_WORKSPACE/tests/WRITE.COM" ci-tail 2>/dev/null
          echo "file contents:"
          cat WROTE.TXT
          grep -q 'dosemu-wrote-ok' WROTE.TXT
          grep -q 'ci-tail' WROTE.TXT
