# Example dosiz configuration
#
# Run with:  dosiz example.cfg
#
# Lines starting with # are comments. Values may reference environment
# variables with $VAR or ${VAR} syntax.

# Program to run inside DOS.  Can be an absolute DOS path (C:\TC\TCC.EXE) or
# a relative name that DOS will find on PATH.
program = HELLO.EXE

# Optional: arguments to pass to the program.  Whitespace-separated.
# args = /Ox /c HELLO.C

# Optional: change to this Linux directory before launching.  The program
# sees this directory as the current directory of the first mounted drive.
# cd = /tmp

# Drive mounts.  Each letter maps to a Linux directory.  If no drive_* line
# is given, dosiz mounts the current directory as C:.
# drive_C = ${HOME}/dos
# drive_D = /mnt/sources

# Default file-handling mode for INT 21h AH=3F/40 reads/writes (Phase 3).
# auto = detect by extension; text = CR/LF↔LF conversion; binary = passthrough
default_mode = auto
eol_convert  = true

# Per-file overrides (also Phase 3).  Same syntax as cpmemu.
*.C   = text
*.H   = text
*.ASM = text
*.MAK = text
*.EXE = binary
*.OBJ = binary

# Device redirection.  Uncomment to forward PRN / AUX to Linux files.
# printer    = /tmp/lpt1.out
# aux_input  = /tmp/com1.in
# aux_output = /tmp/com1.out

# Machine / CPU defaults (passed through to dosbox).
machine = svga_s3
cputype = auto
core    = auto
memsize = 16

# Open an SDL window (for graphical DOS programs).  Default: headless.
# headless = false
